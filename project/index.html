<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Telemetry Viewer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    html, body { margin:0; height:100%; font-family:Arial; background:#000; color:#ddd; }
    #wrap { display: flex; height: 100%; }
    #sidebar { width: 320px; padding: 10px; background: #111; box-sizing: border-box; }
    #map { flex: 1; }
    canvas { width: 100%; height: 180px; background: #222; margin-bottom: 10px; }
    .row { display: flex; justify-content: space-between; font-size: 14px; }
    .row span:first-child { color: #888; }
    button { width: 48%; padding: 6px 8px; margin: 5px 1%; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; }
    .on  { background: #28a745; color: white; }
    .off { background: #dc3545; color: white; }
  </style>
</head>
<body>
<div id="wrap">
  <div id="sidebar">
    <h3 style="text-align:center">Flight HUD</h3>
    <canvas id="horizon" width="276" height="180"></canvas>

    <div class="row"><span>Latitude:</span><span id="lat">--</span></div>
    <div class="row"><span>Longitude:</span><span id="lon">--</span></div>
    <div class="row"><span>Altitude (m):</span><span id="alt">0</span></div>
    <div class="row"><span>Yaw (°):</span><span id="yaw">0</span></div>
    <div class="row"><span>Pitch (°):</span><span id="pitch">0</span></div>
    <div class="row"><span>Roll (°):</span><span id="roll">0</span></div>
    <div class="row"><span>Sats:</span><span id="sat">0</span></div>
    <div class="row"><span>HDOP:</span><span id="hdop">–</span></div>

    <div style="text-align:center; margin-top:12px;">
      <button class="on" onclick="start()">开始采集</button>
      <button class="off" onclick="stop()">停止采集</button>
 
    </div>
  </div>
  <div id="map"></div>
</div>

<script>
const map = L.map('map').setView([0,0], 3);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, subdomains: ['a','b','c']
}).addTo(map);


let polyline = L.polyline([], {color: 'magenta'}).addTo(map);
let marker = null;
let path = [];
let lastLength = 0;

const canvas = document.getElementById("horizon");
const ctx = canvas.getContext("2d");

function drawHorizon(pitch, roll) {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.save();
  ctx.translate(w/2, h/2);
  ctx.rotate(-roll);
  ctx.translate(0, pitch*30);
  ctx.fillStyle = '#0150c0'; ctx.fillRect(-w*2, -h*2, w*4, h*2);
  ctx.fillStyle = '#7d5200'; ctx.fillRect(-w*2, 0, w*4, h*2);
  ctx.restore();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(20, h/2); ctx.lineTo(w-20, h/2); ctx.stroke();
}

function updateUI(row) {
  document.getElementById('lat').textContent = (+row.Latitude).toFixed(6);
  document.getElementById('lon').textContent = (+row.Longitude).toFixed(6);
  document.getElementById('alt').textContent = (+row.Altitude).toFixed(1);
  document.getElementById('yaw').textContent = (+row.Yaw * 180 / Math.PI).toFixed(1);
  document.getElementById('pitch').textContent = (+row.Pitch * 180 / Math.PI).toFixed(1);
  document.getElementById('roll').textContent = (+row.Roll * 180 / Math.PI).toFixed(1);
  document.getElementById('sat').textContent = row.Satellites;
  document.getElementById('hdop').textContent = row.HDOP;
  drawHorizon(+row.Pitch, +row.Roll);
}

function refreshCSV() {
  Papa.parse("telemetry_log.csv", {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      const rows = results.data;
      if (rows.length <= lastLength) return;
      const newRows = rows.slice(lastLength);
      lastLength = rows.length;

      newRows.forEach(row => {
        const lat = parseFloat(row.Latitude), lon = parseFloat(row.Longitude);
        if (!isFinite(lat) || !isFinite(lon)) return;
        const pos = [lat, lon];
        path.push(pos);
        polyline.setLatLngs(path);
        if (!marker) {
          marker = L.circleMarker(pos, {radius:6, color:'yellow'}).addTo(map);
          map.setView(pos, 18);
        } else {
          marker.setLatLng(pos);
        }
        updateUI(row);
      });
    }
  });
}

setInterval(refreshCSV, 1000);

function start() {
  fetch("/start").then(r => r.text()).then(alert);
}
function stop() {
  fetch("/stop").then(r => r.text()).then(alert);
}
</script>
</body>
</html>
